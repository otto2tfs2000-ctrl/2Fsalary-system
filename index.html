<!-- Firebase Realtime Database SDK -->
<script type="module">
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getDatabase, ref, set, get, onValue } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyCQYP21uHGAeSj_i6ANMexMvp3_bciHvTw",
      authDomain:        "otto2-2026.firebaseapp.com",
      databaseURL:       "https://otto2-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "otto2-2026",
      storageBucket:     "otto2-2026.appspot.com",
      messagingSenderId: "108328085665",
      appId:             "1:108328085665:web:071a45a7d7c5af6b6468e0",
    };
    const app = initializeApp(FIREBASE_CONFIG);
    const db  = getDatabase(app);
    const SP  = "salarySystem/staff";
    const MP  = "salarySystem/months";
    window._db = {
      async saveStaff(d)  { await set(ref(db,SP), d); },
      async saveMonths(d) { await set(ref(db,MP), d); },
      async getStaff()    { const s=await get(ref(db,SP)); return s.exists()?s.val():null; },
      async getMonths()   { const s=await get(ref(db,MP)); return s.exists()?s.val():null; },
      listenStaff(cb)     { return onValue(ref(db,SP), snap=>{ if(snap.exists()) cb(snap.val()); }); },
      listenMonths(cb)    { return onValue(ref(db,MP), snap=>{ if(snap.exists()) cb(snap.val()); }); },
    };
    window.dispatchEvent(new Event("firebase-ready"));
  } catch(e) {
    console.error("Firebase failed:", e);
    window._db = null;
    window.dispatchEvent(new Event("firebase-ready"));
  }
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f6f6f4; --bg3: #efefec;
  --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
  --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
  --blue-bg: #e6f1fb; --blue-text: #0c447c;
  --green-bg: #eaf3de; --green-text: #27500a;
  --amber-bg: #faeeda; --amber-text: #633806;
  --danger-bg: #fcebeb; --danger-text: #791f1f; --danger-border: rgba(200,60,60,0.35);
  --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
  --radius: 8px; --radius-lg: 12px;
  --font: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
    --text: #e8e8e4; --text2: #9b9b96; --text3: #6b6b67;
    --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
    --blue-bg: #042c53; --blue-text: #85b7eb;
    --green-bg: #173404; --green-text: #c0dd97;
    --amber-bg: #412402; --amber-text: #fac775;
    --danger-bg: #501313; --danger-text: #f09595;
  }
}
body { font-family: var(--font); background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
.wrap { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:8px; }
.topbar-left { display:flex; align-items:center; gap:10px; }
.app-title { font-size:16px; font-weight:600; }
.sync-wrap { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
.dot { width:8px; height:8px; border-radius:50%; background:var(--text3); transition:background .3s; }
.dot.ok { background:var(--success); } .dot.busy { background:var(--warning); } .dot.err { background:var(--error); }
.topbar-right { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
.topbar-right input { font-size:12px; padding:4px 8px; width:100px; }
.tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:1.5rem; flex-wrap:wrap; }
.tab { padding:8px 16px; cursor:pointer; font-size:13px; border-radius:var(--radius) var(--radius) 0 0; color:var(--text2); border:1px solid transparent; border-bottom:none; background:transparent; font-family:var(--font); }
.tab:hover { background:var(--bg2); color:var(--text); }
.tab.active { background:var(--bg); color:var(--text); border-color:var(--border); font-weight:500; margin-bottom:-1px; padding-bottom:9px; }
.pane { display:none; } .pane.active { display:block; }
.card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; margin-bottom:1rem; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
label.lbl, .lbl { font-size:12px; color:var(--text2); margin-bottom:4px; display:block; }
input, select { width:100%; padding:7px 10px; border:1px solid var(--border2); border-radius:var(--radius); background:var(--bg); color:var(--text); font-size:13px; font-family:var(--font); }
input:focus, select:focus { outline:none; border-color:#378add; box-shadow:0 0 0 2px rgba(55,138,221,.15); }
.btn { padding:7px 14px; border:1px solid var(--border2); border-radius:var(--radius); background:transparent; color:var(--text); cursor:pointer; font-size:13px; font-family:var(--font); }
.btn:hover { background:var(--bg2); }
.btn-primary { background:var(--text); color:var(--bg); border-color:var(--text); }
.btn-primary:hover { opacity:.85; }
.btn-danger { color:var(--danger-text); border-color:var(--danger-border); }
.btn-danger:hover { background:var(--danger-bg); }
.btn-sm { padding:4px 10px; font-size:12px; }
.flex { display:flex; align-items:center; gap:8px; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.mt { margin-top:.75rem; } .mb { margin-bottom:.75rem; }
.badge { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:500; }
.badge-blue { background:var(--blue-bg); color:var(--blue-text); }
.badge-green { background:var(--green-bg); color:var(--green-text); }
.badge-amber { background:var(--amber-bg); color:var(--amber-text); }
.t-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.t-row:last-child { border-bottom:none; }
.avatar { width:36px; height:36px; border-radius:50%; background:var(--blue-bg); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:var(--blue-text); flex-shrink:0; }
.avatar-green { background:var(--green-bg); color:var(--green-text); }
.stat-card { background:var(--bg2); border-radius:var(--radius); padding:10px 12px; text-align:center; }
.stat-lbl { font-size:11px; color:var(--text2); }
.stat-num { font-size:16px; font-weight:600; margin-top:2px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:8px 10px; font-weight:500; border-bottom:1px solid var(--border); font-size:12px; color:var(--text2); }
td { padding:8px 10px; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
.upload-area { border:2px dashed var(--border2); border-radius:var(--radius-lg); padding:2.5rem; text-align:center; cursor:pointer; color:var(--text2); transition:background .15s; }
.upload-area:hover { background:var(--bg2); }
.msg { padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:1rem; }
.msg-info  { background:var(--blue-bg);  color:var(--blue-text); }
.msg-ok    { background:var(--green-bg); color:var(--green-text); }
.msg-warn  { background:var(--amber-bg); color:var(--amber-text); }
.extra-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
.sec-hd { font-size:13px; font-weight:500; color:var(--text2); margin:1rem 0 .5rem; }
.ot-row { display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.ot-row:last-child { border-bottom:none; }
.ot-row input { width:76px; }
/* modal */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; padding:1rem; }
.modal-bg.open { display:flex; }
.modal { background:var(--bg); border-radius:var(--radius-lg); border:1px solid var(--border2); padding:1.5rem; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
</style>

<body>
<div class="wrap">

  <!-- 頂列 -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="app-title">教學薪資管理</span>
      <div class="sync-wrap">
        <span class="dot" id="dot"></span>
        <span id="sync-lbl">連線中...</span>
      </div>
    </div>
    <div class="topbar-right">
      <span>使用者：</span>
      <input id="username" placeholder="輸入您的名字" style="width:100px">
      <span id="last-edit" style="color:var(--text3)"></span>
    </div>
  </div>

  <!-- 頁籤 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('staff')">人員設定</button>
    <button class="tab" onclick="switchTab('stats')">每月統計</button>
    <button class="tab" onclick="switchTab('salary')">薪資計算</button>
    <button class="tab" onclick="switchTab('tiers')">獎金級距</button>
  </div>

  <!-- 人員設定 -->
  <div id="pane-staff" class="pane active">

    <!-- 密碼鎖畫面 -->
    <div id="staff-lock" style="display:flex;align-items:center;justify-content:center;min-height:320px">
      <div style="width:100%;max-width:340px">
        <div style="text-align:center;margin-bottom:1.5rem">
          <div style="font-size:32px;margin-bottom:8px">🔒</div>
          <div style="font-size:16px;font-weight:600">人員設定</div>
          <div style="font-size:13px;color:var(--text2);margin-top:4px">請輸入帳號與密碼才能進入</div>
        </div>
        <div class="card" style="padding:1.25rem">
          <div class="mb">
            <label class="lbl">帳號</label>
            <input id="lock-user" type="text" placeholder="請輸入帳號" autocomplete="username"
              onkeydown="if(event.key==='Enter')document.getElementById('lock-pass').focus()">
          </div>
          <div class="mb">
            <label class="lbl">密碼</label>
            <div style="position:relative">
              <input id="lock-pass" type="password" placeholder="請輸入密碼" autocomplete="off"
                style="padding-right:48px;letter-spacing:0.1em"
                onkeydown="if(event.key==='Enter')unlockStaff()">
              <button type="button"
                onclick="togglePass()"
                id="pass-eye"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px;color:#666">&#128065;</button>
            </div>
          </div>
          <div id="lock-err" style="font-size:12px;color:var(--danger-text);margin-bottom:8px;display:none">帳號或密碼錯誤</div>
          <button class="btn btn-primary" style="width:100%" onclick="unlockStaff()">登入</button>
        </div>
      </div>
    </div>

    <!-- 人員設定內容（解鎖後才顯示） -->
    <div id="staff-content" style="display:none">
      <div class="flex-between mb">
        <span style="font-size:15px;font-weight:600">人員設定</span>
        <div class="flex">
          <button class="btn btn-sm" onclick="openModal('add','fulltime',null)">＋ 新增正職</button>
          <button class="btn btn-sm" onclick="openModal('add','parttime',null)">＋ 新增兼職</button>
          <button class="btn btn-sm btn-danger" onclick="lockStaff()">登出</button>
        </div>
      </div>
      <div class="sec-hd">正職人員</div>
      <div class="card" id="ft-list"></div>
      <div class="sec-hd">兼職人員</div>
      <div class="card" id="pt-list"></div>
    </div>

  </div>

  <!-- 每月統計 -->
  <div id="pane-stats" class="pane">
    <div class="flex-between mb">
      <span style="font-size:15px;font-weight:600">每月教學統計</span>
      <div class="flex">
        <select id="month-sel" style="width:auto" onchange="switchMonth(this.value)"></select>
        <button class="btn btn-sm btn-primary" onclick="document.getElementById('file-in').click()">↑ 匯入 xlsx</button>
        <input type="file" id="file-in" accept=".xlsx,.xls" style="display:none" onchange="handleUpload(event)">
      </div>
    </div>
    <div id="stats-msg"></div>
    <div id="stats-table"></div>
    <div id="ot-section" style="display:none">
      <div class="sec-hd">超時時數（正職）</div>
      <div class="card" id="ot-inputs"></div>
    </div>
  </div>

  <!-- 薪資計算 -->
  <div id="pane-salary" class="pane">
    <div class="flex-between mb">
      <span style="font-size:15px;font-weight:600">薪資計算</span>
      <div class="flex">
        <select id="sal-sel" style="width:auto" onchange="renderSalary()"></select>
        <button class="btn btn-sm btn-primary" onclick="exportSalary()">↓ 匯出薪資單</button>
      </div>
    </div>
    <div id="sal-content"></div>
  </div>

  <!-- 獎金級距 -->
  <div id="pane-tiers" class="pane">
    <p style="font-size:15px;font-weight:600;margin-bottom:1rem">正職人次獎金級距</p>
    <div class="card">
      <table><thead><tr><th>人次區間</th><th>等級金額（每人次）</th><th>滿級獎金</th><th>計算方式</th></tr></thead>
      <tbody id="tier-tbody"></tbody></table>
    </div>
    <p style="font-size:15px;font-weight:600;margin:1rem 0 .5rem">超時獎金規則</p>
    <div class="card" style="font-size:13px;color:var(--text2);line-height:2.2">
      每週總教學時數超過 <strong style="color:var(--text)">16 小時</strong> 後開始計算<br>
      超出部分每小時 <strong style="color:var(--text)">NT$250</strong>
    </div>
  </div>

</div><!-- /wrap -->

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="flex-between mb">
      <span style="font-size:15px;font-weight:600" id="modal-title"></span>
      <button class="btn btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="flex mt" style="justify-content:flex-end;gap:8px">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>

<script>
// ── 常數 ────────────────────────────────────────────────
const TIERS = [
  { min:1,   max:50,  rate:1,  label:"1-50"    },
  { min:51,  max:100, rate:5,  label:"51-100"  },
  { min:101, max:150, rate:8,  label:"101-150" },
  { min:151, max:200, rate:12, label:"151-200" },
  { min:201, max:250, rate:17, label:"201-250" },
  { min:251, max:300, rate:30, label:"251-300" },
  { min:301, max:350, rate:35, label:"301-350" },
  { min:351, max:400, rate:40, label:"351-400" },
  { min:401, max:450, rate:50, label:"401-450" },
  { min:451, max:null,rate:50, label:"451+"    },
];

const DEFAULT_STAFF = {
  fulltime: [
    {id:1, name:'林小明', nick:'蘋果老師', base:35000, mgr:false, mgrAmt:0, extras:[]},
    {id:2, name:'陳美玲', nick:'寒寒老師', base:32000, mgr:true,  mgrAmt:3000, extras:[]},
    {id:3, name:'王大華', nick:'球球老師', base:30000, mgr:false, mgrAmt:0, extras:[]},
    {id:4, name:'張小芳', nick:'花花老師', base:30000, mgr:false, mgrAmt:0, extras:[]},
    {id:5, name:'李志遠', nick:'大熊老師', base:30000, mgr:true,  mgrAmt:3000, extras:[]},
  ],
  parttime: [
    {id:10, name:'黃雅婷', nick:'星星老師', rates:{y:400,m:500,o:600}, full:true,  fullAmt:500, fullThr:6, extras:[]},
    {id:11, name:'劉冠宇', nick:'軟糖老師', rates:{y:400,m:500,o:600}, full:false, fullAmt:0,   fullThr:6, extras:[]},
    {id:12, name:'吳珊珊', nick:'鯨魚老師', rates:{y:400,m:500,o:600}, full:false, fullAmt:0,   fullThr:6, extras:[]},
  ],
  lastEditBy: '', lastEditAt: '',
};

// ── 狀態 ────────────────────────────────────────────────
let staff  = JSON.parse(JSON.stringify(DEFAULT_STAFF));
let months = {};       // { "2026-06": { data:{}, overtime:{} }, ... }
let currentMonth = null;
let editCtx = null;

// ── Firebase 橋接 ────────────────────────────────────────
function syncStatus(state, msg) {
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('sync-lbl');
  dot.className = 'dot ' + state;
  lbl.textContent = msg;
}

async function saveStaff() {
  if (!window._db) return;
  syncStatus('busy', '儲存中...');
  const who = document.getElementById('username').value || '未知';
  staff.lastEditBy = who;
  staff.lastEditAt = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  try {
    await window._db.saveStaff(staff);
    syncStatus('ok', '已同步 ' + staff.lastEditAt);
    document.getElementById('last-edit').textContent = '上次：' + staff.lastEditBy + ' ' + staff.lastEditAt;
  } catch(e) { syncStatus('err', '儲存失敗'); }
}

async function saveMonths() {
  if (!window._db) return;
  syncStatus('busy', '儲存中...');
  try {
    await window._db.saveMonths(months);
    syncStatus('ok', '已同步');
  } catch(e) { syncStatus('err', '儲存失敗'); }
}

function applyRemoteStaff(data) {
  staff = data;
  if (isUnlocked()) renderStaff();
  const lel = document.getElementById('last-edit');
  if (staff.lastEditBy) lel.textContent = '上次：' + staff.lastEditBy + ' ' + staff.lastEditAt;
  syncStatus('ok', '已同步 ' + (staff.lastEditAt||''));
}

function applyRemoteMonths(data) {
  months = data || {};
  if (!currentMonth) currentMonth = Object.keys(months).sort().reverse()[0] || null;
  buildMonthOpts('month-sel');
  buildMonthOpts('sal-sel');
  const activeTab = document.querySelector('.tab.active');
  const tabs = ['staff','stats','salary','tiers'];
  const idx  = [...document.querySelectorAll('.tab')].indexOf(activeTab);
  if (idx === 1) renderStatsTab();
  if (idx === 2) renderSalary();
  syncStatus('ok', '已同步');
}

// ── 初始化 ───────────────────────────────────────────────
window.addEventListener('firebase-ready', async () => {
  if (!window._db) {
    syncStatus('err', '離線模式（Firebase 未連線）');
    renderTiers();
    return;
  }
  syncStatus('busy', '載入資料...');
  try {
    const [s, m] = await Promise.all([window._db.getStaff(), window._db.getMonths()]);
    if (s) { staff  = s; if (isUnlocked()) renderStaff(); }
    if (m) { months = m; currentMonth = Object.keys(m).sort().reverse()[0] || null; }
    buildMonthOpts('month-sel');
    buildMonthOpts('sal-sel');
    renderTiers();
    syncStatus('ok', '已連線');
    window._db.listenStaff(applyRemoteStaff);
    window._db.listenMonths(applyRemoteMonths);
  } catch(e) {
    syncStatus('err', '載入失敗：' + e.message);
    renderTiers();
  }
});

// ── 工具函式 ─────────────────────────────────────────────
const ini  = n => n.replace(/老師/,'').replace(/[\u{1F300}-\u{1F9FF}]/gu,'').trim().slice(0,2) || n.slice(0,2);
const ym2l = ym => { if(!ym) return ''; const [y,m]=ym.split('-'); return y+'年'+parseInt(m)+'月'; };
const nowYM= () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const calcBonus = tot => { if(!tot||tot<1) return 0; const tier=TIERS.slice().reverse().find(t=>tot>=t.min); return tier ? tot*tier.rate : 0; };
const calcOT    = h   => { const ex=Math.max(0,(parseFloat(h)||0)-16); return ex>0 ? '超時獎金 +$'+Math.round(ex*250).toLocaleString() : '（未超時）'; };
const getCat    = c   => {
  if(!c||c.includes('商品')) return null;
  if(/^2-3歲/.test(c)) return 'y';
  if(/^4-5歲/.test(c)) return 'm';
  if(/^6-8歲/.test(c)) return 'o68';
  if(/^9-12歲/.test(c)) return 'o912';
  return null;
};
const getAtt  = s => parseInt(String(s||'').split('/')[0])||0;
const findTd  = (nick, data) => Object.values(data||{}).find(d=>d.name.replace(/\s/g,'')===nick.replace(/\s/g,''));

// ── 密碼鎖 ───────────────────────────────────────────────
const LOCK_USER = "otto2tfp";
const LOCK_PASS = "12707656";
const LOCK_KEY  = "staff_unlocked";

function isUnlocked() {
  return sessionStorage.getItem(LOCK_KEY) === "1";
}
function togglePass() {
  var i = document.getElementById('lock-pass');
  var btn = document.getElementById('pass-eye');
  if (i.type === 'text') {
    i.type = 'password';
    btn.innerHTML = '&#128065;';
  } else {
    i.type = 'text';
    btn.innerHTML = '&#128584;';
  }
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>{

  });
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));

function buildMonthOpts(selId) {
  const el = document.getElementById(selId); if(!el) return;

// ── 每月統計 ─────────────────────────────────────────────
function detectMonth(rows) {
  for (const r of rows) {
    const m = String(r['日期']||'').match(/(\d{4})-(\d{2})/);
    if (m) return m[1]+'-'+m[2];
  }
  return nowYM();
}
function processRows(rows, data) {
  rows.forEach(row=>{
    const teacher=(row['老師']||'').trim();
    const course = row['課程']||'';
    const cat = getCat(course);
    if(!teacher||!cat) return;
    if(!data[teacher]) data[teacher]={name:teacher,y:0,m:0,o68:0,o912:0,sy:0,sm:0,so68:0,so912:0};
    const att=getAtt(row['出席狀態']);
    if(cat==='y')   {data[teacher].y+=att;   data[teacher].sy++;}
    else if(cat==='m')   {data[teacher].m+=att;   data[teacher].sm++;}
    else if(cat==='o68') {data[teacher].o68+=att;  data[teacher].so68++;}
    else if(cat==='o912'){data[teacher].o912+=att; data[teacher].so912++;}
  });
}
function handleUpload(e) {
  const file=e.target.files[0]; if(!file) return;
  document.getElementById('stats-msg').innerHTML='<div class="msg msg-info">讀取中...</div>';
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const ym=detectMonth(rows);
      if(!months[ym]) months[ym]={data:{},overtime:{}};
      processRows(rows, months[ym].data);
      currentMonth=ym;
      buildMonthOpts('month-sel'); buildMonthOpts('sal-sel');
      document.getElementById('month-sel').value=ym;
      document.getElementById('stats-msg').innerHTML=`<div class="msg msg-ok">✓ 已匯入「${file.name}」→ ${ym2l(ym)}，共 ${rows.length} 筆</div>`;
      renderStatsTab(); saveMonths();
    } catch(err) {
      document.getElementById('stats-msg').innerHTML=`<div style="color:var(--danger-text)">讀取失敗：${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

    const pB=calcBonus(tot), otH=parseFloat(ot[t.id]||0), otB=Math.round(Math.max(0,otH-16)*250);
    const ext=(t.extras||[]).reduce((s,e)=>s+e.v,0);
    ftR.push([t.name,t.nick,t.base,tot,pB,otH,otB,t.mgr?t.mgrAmt:0,ext,t.base+pB+otB+(t.mgr?t.mgrAmt:0)+ext]);
  });
  const fs=XLSX.utils.aoa_to_sheet(ftR);
  fs['!cols']=[{wch:10},{wch:12},{wch:10},{wch:8},{wch:12},{wch:10},{wch:12},{wch:10},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,fs,'正職薪資');
  const ptR=[['姓名','暱稱','2-3歲堂數','課時費','4-5歲堂數','課時費','6-12歲堂數','課時費','活動費','總薪']];
  (staff.parttime||[]).forEach(t=>{
    const td=findTd(t.nick,data), sy=td?.sy||0, sm=td?.sm||0, so=(td?.so68||0)+(td?.so912||0);
    const ext=(t.extras||[]).reduce((s,e)=>s+e.v,0);
    ptR.push([t.name,t.nick,sy,sy*t.rates.y,sm,sm*t.rates.m,so,so*t.rates.o,ext,sy*t.rates.y+sm*t.rates.m+so*t.rates.o+ext]);
  });
  const ps=XLSX.utils.aoa_to_sheet(ptR);
  ps['!cols']=[{wch:10},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ps,'兼職薪資');
  XLSX.writeFile(wb,`薪資單_${ym}.xlsx`);
}

// ── 獎金級距 ─────────────────────────────────────────────
function renderTiers() {
  document.getElementById("tier-tbody").innerHTML=TIERS.map(t=>{
    const fullBonus = t.max ? t.max*t.rate : null;
    return `<tr><td>${t.label}</td><td style="font-weight:600">${t.rate}</td><td style="color:var(--green-text)">${fullBonus ? "$"+fullBonus.toLocaleString() : "持續累加"}</td><td style="font-size:12px;color:var(--text2)">人次 � $${t.rate}</td></tr>`;
  }).join("");
}
}

// ── 初始渲染（Firebase 尚未就緒時的 fallback）──────────────
if (isUnlocked()) renderStaff();
renderTiers();
</script>
